<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8dc53" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="小鲨记账" />
    <title>小鲨记账</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="month-hero" aria-label="月度概览">
        <header class="hero-top">
          <button class="avatar-button" type="button" data-tab-target="mine" aria-label="我的">
            <span aria-hidden="true">◔</span>
            <b id="noticeDot">1</b>
          </button>
          <h1>小鲨记账</h1>
          <button class="icon-button bare" id="backupButton" type="button" title="导出备份" aria-label="导出备份">
            <span aria-hidden="true">⇩</span>
          </button>
        </header>

        <div class="month-summary">
          <button class="month-picker" id="monthPicker" type="button" aria-label="切换月份">
            <span id="summaryYear">2026年</span>
            <strong><span id="summaryMonth">06</span>月</strong>
          </button>
          <div>
            <span>收入</span>
            <strong id="monthIncome">0.00</strong>
          </div>
          <div>
            <span>支出</span>
            <strong id="monthExpense">0.00</strong>
          </div>
        </div>
      </section>

      <section class="quick-panel" aria-label="快捷功能">
        <button class="quick-action active" type="button" data-tab-target="detail">
          <span class="quick-icon" aria-hidden="true">▤</span>
          <em>账单</em>
        </button>
        <button class="quick-action" type="button" data-tab-target="budget">
          <span class="quick-icon" aria-hidden="true">◰</span>
          <em>预算</em>
        </button>
        <button class="quick-action" type="button" data-tab-target="assets">
          <span class="quick-icon" aria-hidden="true">¥</span>
          <em>资产管家</em>
        </button>
        <button class="quick-action" type="button" data-tab-target="discover">
          <span class="quick-icon" aria-hidden="true">↩</span>
          <em>退款记录</em>
        </button>
        <button class="quick-action" type="button" data-tab-target="mine">
          <span class="quick-icon" aria-hidden="true">•••</span>
          <em>更多</em>
        </button>
      </section>

      <section class="view active" id="detailView" aria-labelledby="detailTitle">
        <div class="section-bar">
          <h2 id="detailTitle">明细</h2>
          <label class="date-chip">
            <span>日期</span>
            <input id="dateInput" type="date" />
          </label>
        </div>
        <div class="empty-state" id="emptyState">这个月还没有记录，点中间的 + 开始记一笔。</div>
        <div class="day-groups" id="dayGroups"></div>
      </section>

      <section class="view" id="budgetView" aria-labelledby="budgetTitle">
        <section class="plain-panel">
          <div class="section-heading">
            <h2 id="budgetTitle">月预算</h2>
            <span id="budgetStatus">本月还可用 0.00</span>
          </div>
          <form class="budget-form" id="budgetForm">
            <label>
              <span>月支出预算</span>
              <input id="monthlyBudget" type="number" min="0" step="0.01" inputmode="decimal" placeholder="例如 3500" />
            </label>
            <button class="primary-button" type="submit">保存预算</button>
          </form>
          <div class="budget-meter" aria-hidden="true">
            <span id="budgetMeterFill"></span>
          </div>
          <p class="muted-copy" id="budgetHint">预算只保存在本机，不会上传。</p>
        </section>
      </section>

      <section class="view" id="assetsView" aria-labelledby="assetsTitle">
        <section class="plain-panel">
          <div class="section-heading">
            <h2 id="assetsTitle">资产管家</h2>
            <span id="netWorthText">净资产 0.00</span>
          </div>
          <form class="asset-form" id="assetForm">
            <label>
              <span>现金/余额</span>
              <input id="cashAsset" type="number" step="0.01" inputmode="decimal" />
            </label>
            <label>
              <span>储蓄/理财</span>
              <input id="savingAsset" type="number" step="0.01" inputmode="decimal" />
            </label>
            <label>
              <span>信用卡/负债</span>
              <input id="debtAsset" type="number" step="0.01" inputmode="decimal" />
            </label>
            <button class="primary-button" type="submit">保存资产</button>
          </form>
        </section>
      </section>

      <section class="view" id="chartView" aria-labelledby="chartTitle">
        <section class="plain-panel">
          <div class="section-heading">
            <h2 id="chartTitle">图表</h2>
            <span id="averageDailyText">日均支出 0.00</span>
          </div>
          <div class="chart-tabs" role="tablist" aria-label="图表类型">
            <button class="chart-tab active" type="button" data-chart="expense">支出</button>
            <button class="chart-tab" type="button" data-chart="income">收入</button>
          </div>
          <div class="bar-chart" id="barChart"></div>
        </section>
        <section class="plain-panel">
          <div class="section-heading">
            <h2>分类排行</h2>
            <span id="categoryTotalText">合计 0.00</span>
          </div>
          <div class="category-rank" id="categoryRank"></div>
        </section>
      </section>

      <section class="view add-view" id="addView" aria-labelledby="addTitle">
        <section class="entry-card">
          <div class="add-header">
            <h2 id="addTitle">记一笔</h2>
            <div class="type-switch" aria-label="收支类型">
              <button class="active" id="expenseType" type="button" data-type="expense">支出</button>
              <button id="incomeType" type="button" data-type="income">收入</button>
            </div>
          </div>

          <form id="entryForm">
            <input id="entryType" type="hidden" value="expense" />
            <label class="amount-field">
              <span>金额</span>
              <input id="amountInput" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" required />
            </label>
            <div>
              <span class="field-label">分类</span>
              <div class="category-grid" id="categoryGrid"></div>
            </div>
            <div class="form-row">
              <label>
                <span>日期</span>
                <input id="entryDateInput" type="date" />
              </label>
              <label>
                <span>账户</span>
                <select id="accountInput">
                  <option>微信</option>
                  <option>支付宝</option>
                  <option>银行卡</option>
                  <option>现金</option>
                  <option>信用卡</option>
                </select>
              </label>
            </div>
            <label>
              <span>备注</span>
              <input id="noteInput" type="text" placeholder="可选，例如和朋友吃饭" autocomplete="off" />
            </label>
            <button class="primary-button submit-entry" type="submit">保存</button>
          </form>
        </section>
      </section>

      <section class="view" id="discoverView" aria-labelledby="discoverTitle">
        <section class="plain-panel">
          <div class="section-heading">
            <h2 id="discoverTitle">发现</h2>
            <span>无广告版</span>
          </div>
          <div class="discover-grid">
            <button type="button" data-fill-category="餐饮">常记餐饮</button>
            <button type="button" data-fill-category="购物">常记购物</button>
            <button type="button" data-fill-category="交通">常记交通</button>
            <button type="button" data-fill-category="工资">记录收入</button>
          </div>
        </section>
      </section>

      <section class="view" id="mineView" aria-labelledby="mineTitle">
        <section class="plain-panel">
          <div class="section-heading">
            <h2 id="mineTitle">我的</h2>
            <button class="ghost-button danger" id="resetAll" type="button">重置全部</button>
          </div>
          <dl class="mine-stats">
            <div>
              <dt>本月结余</dt>
              <dd id="balanceText">0.00</dd>
            </div>
            <div>
              <dt>记录笔数</dt>
              <dd id="entryCountText">0</dd>
            </div>
          </dl>
          <label class="import-box">
            <span>导入备份 JSON</span>
            <input id="importFile" type="file" accept="application/json" />
          </label>
        </section>
      </section>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="nav-item active" type="button" data-tab-target="detail">
          <span aria-hidden="true">▤</span>
          <b>明细</b>
        </button>
        <button class="nav-item" type="button" data-tab-target="chart">
          <span aria-hidden="true">⌁</span>
          <b>图表</b>
        </button>
        <button class="add-tab active-add" type="button" data-tab-target="add" aria-label="记账">
          <span aria-hidden="true">+</span>
          <b>记账</b>
        </button>
        <button class="nav-item" type="button" data-tab-target="discover">
          <span aria-hidden="true">◒</span>
          <b>发现</b>
        </button>
        <button class="nav-item" type="button" data-tab-target="mine">
          <span aria-hidden="true">◎</span>
          <b>我的</b>
        </button>
      </nav>
    </main>

    <template id="dayGroupTemplate">
      <section class="day-group">
        <header>
          <span class="day-label"></span>
          <span class="day-total"></span>
        </header>
        <ul></ul>
      </section>
    </template>

    <template id="entryTemplate">
      <li class="entry-item">
        <div class="category-badge" aria-hidden="true"></div>
        <div class="entry-main">
          <strong></strong>
          <small></small>
        </div>
        <div class="entry-side">
          <span class="entry-amount"></span>
          <button class="delete-button" type="button" title="删除" aria-label="删除">×</button>
        </div>
      </li>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
